name: Release

# Builds prebuilt `pawrly` binaries for each supported platform and attaches
# them (plus SHA-256 checksums) to the GitHub Release for the pushed tag.
# The naming here MUST match scripts/install.sh:
#   pawrly-<target>.tar.gz  and  pawrly-<target>.tar.gz.sha256

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build and publish (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: pawrly

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          # Cross-compiled from an Apple Silicon runner: the macos-13 Intel
          # image is deprecated and its runner queue can stall for hours.
          - target: x86_64-apple-darwin
            os: macos-14
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Build the web Console first so the `console` feature can embed
      # apps/console/dist into the binary via rust-embed.
      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/console/pnpm-lock.yaml

      - name: Build web Console
        working-directory: apps/console
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Build release binary
        run: cargo build --release --locked -p pawrly-cli --bin "$BIN_NAME" --features console --target ${{ matrix.target }}

      - name: Package tarball + checksum
        shell: bash
        run: |
          set -euo pipefail
          dist="dist"
          mkdir -p "$dist"
          bin="target/${{ matrix.target }}/release/${BIN_NAME}"
          tarball="${BIN_NAME}-${{ matrix.target }}.tar.gz"

          # Stage the bare binary so the archive extracts to ./pawrly.
          staging="$(mktemp -d)"
          cp "$bin" "$staging/${BIN_NAME}"
          tar -czf "$dist/$tarball" -C "$staging" "${BIN_NAME}"

          # SHA-256 sidecar, portable across Linux/macOS runners.
          cd "$dist"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$tarball" > "$tarball.sha256"
          else
            shasum -a 256 "$tarball" > "$tarball.sha256"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: pawrly-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
