syntax = "proto3";
package pawrly.v1;

import "pawrly/v1/common.proto";

service CatalogService {
  rpc ListTables(ListTablesRequest) returns (ListTablesResponse);
  rpc DescribeTable(DescribeTableRequest) returns (DescribeTableResponse);
  rpc SchemaSnapshot(SchemaSnapshotRequest) returns (SchemaSnapshotResponse);
  rpc RefreshCatalog(RefreshCatalogRequest) returns (RefreshCatalogResponse);
  rpc ListFunctions(ListFunctionsRequest) returns (ListFunctionsResponse);
  rpc DescribeFunction(DescribeFunctionRequest) returns (DescribeFunctionResponse);
}

message ListTablesRequest {
  optional string source = 1;
  optional string name_glob = 2;
}

message ListTablesResponse {
  repeated TableInfo tables = 1;
}

message DescribeTableRequest { TableName name = 1; }

message DescribeTableResponse {
  TableInfo table = 1;
  repeated ColumnSpec columns = 2;
  repeated string pushable_filter_columns = 3;
  repeated string examples = 4;
  // Agent-facing usage notes from the manifest (source + table `wiki`).
  optional string wiki = 5;
}

message SchemaSnapshotRequest {
  repeated string sources = 1;
  bool compact = 2;
}

message SchemaSnapshotResponse {
  bytes snapshot_json = 1;
}

message RefreshCatalogRequest {
  optional string source = 1;
}

message RefreshCatalogResponse {
  uint64 sources_refreshed = 1;
  uint64 tables_discovered = 2;
}

// ---- functions ----

message ListFunctionsRequest {}
message ListFunctionsResponse { repeated FunctionInfo functions = 1; }

message FunctionInfo {
  string namespace = 1;
  string name = 2;
  string kind = 3;          // "http" | "mcp" | "file"
  bool builtin = 4;
  string signature = 5;
  optional string description = 6;
}

message DescribeFunctionRequest {
  string namespace = 1;
  string name = 2;
}
message DescribeFunctionResponse { FunctionDescription function = 1; }

message FunctionDescription {
  string namespace = 1;
  string name = 2;
  string kind = 3;
  bool builtin = 4;
  string signature = 5;
  optional string description = 6;
  optional string wiki = 7;
  repeated string examples = 8;
  repeated FunctionArg args = 9;
  repeated FunctionColumn returns = 10;
}

message FunctionArg {
  string name = 1;
  string type = 2;
  bool required = 3;
  optional string default = 4;
  optional string description = 5;
  optional string tool_arg = 6;
}

message FunctionColumn {
  string name = 1;
  string type = 2;
  optional string source = 3;
  optional string description = 4;
}
