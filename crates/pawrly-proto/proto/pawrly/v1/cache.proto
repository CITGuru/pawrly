syntax = "proto3";
package pawrly.v1;

import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";
import "pawrly/v1/common.proto";

service CacheService {
  rpc ListEntries(ListEntriesRequest) returns (ListEntriesResponse);
  rpc Refresh(RefreshRequest) returns (RefreshResponse);
  rpc Invalidate(InvalidateRequest) returns (InvalidateResponse);
  rpc Vacuum(VacuumRequest) returns (VacuumResponse);
  // Persist a query result as a named, self-backed materialized table.
  rpc Materialize(MaterializeRequest) returns (MaterializeResponse);
  rpc DropMaterialized(DropMaterializedRequest) returns (DropMaterializedResponse);
  // Drop an entire materialize namespace (session teardown).
  rpc DropNamespace(DropNamespaceRequest) returns (DropNamespaceResponse);
}

message DropNamespaceRequest { string namespace = 1; }
message DropNamespaceResponse {
  bool dropped = 1;
  // Echo of the request's namespace (see MaterializeResponse.namespace).
  string namespace = 2;
}

message CacheEntryInfo {
  TableName name = 1;
  CacheMode mode = 2;
  google.protobuf.Timestamp written_at = 3;
  optional google.protobuf.Timestamp expires_at = 4;
  uint64 row_count = 5;
  uint64 size_bytes = 6;
  uint32 file_count = 7;
}

// Empty namespace = the default workspace namespace.
message ListEntriesRequest { string namespace = 1; }
message ListEntriesResponse {
  repeated CacheEntryInfo entries = 1;
  // Echo of the request's namespace (see MaterializeResponse.namespace).
  string namespace = 2;
}

message RefreshRequest {
  TableName name = 1;
  // Materialize namespace of the table; empty = the default workspace
  // namespace. Only valid for `materialized.<name>` targets.
  string namespace = 2;
}
message RefreshResponse {
  uint64 rows_written = 1;
  uint64 size_bytes = 2;
  google.protobuf.Duration elapsed = 3;
  optional google.protobuf.Timestamp expires_at = 4;
  // Echo of the request's namespace (see MaterializeResponse.namespace).
  string namespace = 5;
}

message InvalidateRequest { TableName name = 1; }
message InvalidateResponse { bool removed = 1; }

message VacuumRequest {}
message VacuumResponse {
  uint64 entries_removed = 1;
  uint64 files_removed = 2;
  uint64 bytes_reclaimed = 3;
}

// How a materialized table is produced.
message MaterializeSpec {
  oneof spec {
    QuerySpec query = 1;
    FileSpec file = 2;
    UrlSpec url = 3;
    InlineSpec inline = 4;
  }
}

// Tabular format for File/Url/Inline origins. UNSPECIFIED = infer from the
// path/URL extension (not valid for Inline, which has no extension).
enum MaterializeFormat {
  MATERIALIZE_FORMAT_UNSPECIFIED = 0;
  MATERIALIZE_FORMAT_PARQUET = 1;
  MATERIALIZE_FORMAT_CSV = 2;
  MATERIALIZE_FORMAT_JSON = 3;
}

message QuerySpec {
  string sql = 1;
  map<string, string> params = 2;
}

message FileSpec {
  string path = 1;
  MaterializeFormat format = 2;
}

message UrlSpec {
  string url = 1;
  MaterializeFormat format = 2;
}

message InlineSpec {
  bytes bytes = 1;
  MaterializeFormat format = 2;
}

message MaterializeRequest {
  string name = 1;
  MaterializeSpec spec = 2;
  // Target namespace — the table becomes queryable as
  // `<namespace>.materialized.<name>`. Empty = the default workspace namespace.
  string namespace = 3;
}
message MaterializeResponse {
  TableName name = 1;
  string file_path = 2;
  uint64 row_count = 3;
  uint64 size_bytes = 4;
  // Echo of the request's namespace; empty when the server predates
  // namespaces — how a client detects that its namespace was ignored.
  string namespace = 5;
}

message DropMaterializedRequest {
  string name = 1;
  // Empty = the default workspace namespace.
  string namespace = 2;
}
message DropMaterializedResponse {
  bool dropped = 1;
  // Echo of the request's namespace (see MaterializeResponse.namespace).
  string namespace = 2;
}
