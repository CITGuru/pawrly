# Semantic-layer example — the smallest runnable showcase of `semantic:`.
# yaml-language-server: $schema=../../schemas/pawrly.schema.json
#
# Two CSV tables (orders, customers) auto-discovered from ./data/*.csv are
# turned into two business models. See docs/semantic.md for the full design.
#
# Try it (paths resolve relative to this file):
#   pawrly --config examples/semantic/pawrly.yaml semantic list
#   pawrly --config examples/semantic/pawrly.yaml semantic describe orders
#
#   # `orders` enforces tenant row-level security, so supply the param:
#   pawrly --config examples/semantic/pawrly.yaml semantic query \
#     orders.revenue orders.order_count --by orders.status --param tenant_id=acme
#
#   # Time grains + a measure-scoped filter:
#   pawrly --config examples/semantic/pawrly.yaml semantic query \
#     orders.revenue orders.paid_revenue --by orders.order_date.month \
#     --param tenant_id=acme --order-by orders.order_date.month
#
#   # Cross-model join (orders -> customers via the `customer` relationship):
#   pawrly --config examples/semantic/pawrly.yaml semantic query \
#     orders.revenue --by customers.region --param tenant_id=acme
#
#   # Omit --param and the engine refuses to scan (RLS, PAWRLY_SAFETY_UNBOUND_PARAM):
#   pawrly --config examples/semantic/pawrly.yaml semantic query \
#     orders.revenue --by orders.status
#
#   # Pre-aggregation: `customers` has no RLS and `customer_total` is
#   # additive, so this query reads the materialized rollup, not the base table.
#   pawrly --config examples/semantic/pawrly.yaml semantic query \
#     customers.customer_total --by customers.region
#   pawrly --config examples/semantic/pawrly.yaml cache list   # shows the rollup
#
#   # Metrics — composed business numbers queried by their dot-free name.
#   # A ratio (avg order value) and a cross-model ratio (revenue per customer):
#   pawrly --config examples/semantic/pawrly.yaml semantic query \
#     aov --by orders.status --param tenant_id=acme
#   pawrly --config examples/semantic/pawrly.yaml semantic query \
#     arpu --by customers.region --param tenant_id=acme
#
#   # Window metrics run on a dense month axis, so a month with no orders
#   # still counts (running total carries, month-over-month never skips):
#   pawrly --config examples/semantic/pawrly.yaml semantic query \
#     revenue_running revenue_mom --by orders.order_date.month \
#     --param tenant_id=acme --order-by orders.order_date.month
#
#   # Share of the whole, partitioned by country:
#   pawrly --config examples/semantic/pawrly.yaml semantic query \
#     country_share orders.revenue --by orders.country --param tenant_id=acme

version: 1
name: semantic-example

sources:
  - name: data
    kind: file
    description: Local CSV fixtures for the semantic example.
    config:
      path: ./data/*.csv

semantic:
  models:
    # ----- orders: the fact model -------------------------------------------
    - name: orders
      description: One row per order placed.
      source: data.orders
      primary_key: [id]

      dimensions:
        - { name: status,     expr: status,                type: string }
        - { name: country,    expr: shipping_country_code, type: string }
        - { name: order_date, expr: ordered_at,            type: time, grains: [day, week, month, quarter, year] }

      measures:
        - { name: order_count,     agg: count_distinct, expr: id }
        - { name: revenue,         agg: sum,            expr: total_amount, format: "$#,##0.00" }
        # Measure-scoped filter → compiles to SUM(...) FILTER (WHERE status = 'paid').
        - { name: paid_revenue,    agg: sum,            expr: total_amount, filters: ["status = 'paid'"], format: "$#,##0.00" }
        - { name: avg_order_value, agg: avg,            expr: total_amount, format: "$#,##0.00" }
        # For ratios/arithmetic between measures, prefer a metric (below) over
        # a `custom` SQL aggregate — the leaves stay visible to filters,
        # fan-out checks, and rollups.

      relationships:
        - { name: customer, kind: many_to_one, target: customers, on: "this.customer_id = customers.id" }

      # Declared rollup (S6). It is registered as a cached table with a
      # background refresher on the `refresh:` cadence (hourly). Because `orders`
      # enforces RLS, its *queries* read the base table (a rollup would need to
      # carry the RLS columns). The non-RLS `customers` rollup below is the one
      # queries actually read — see `pawrly cache list` after running it.
      pre_aggregations:
        - name: daily_by_status
          dimensions: [order_date.day, status]
          measures:   [revenue, order_count]
          refresh:    1h
          partition_by: order_date.month

      safety:
        # RLS: every compiled query is AND-ed with `tenant_id = <param>`, bound
        # as an escaped literal (never string-substituted). Query without the
        # param and the engine refuses to scan (PAWRLY_SAFETY_UNBOUND_PARAM).
        required_predicates:
          - "tenant_id = ${param:tenant_id}"
        max_rows: 1000000
        # Uncomment to also force every query to filter on a date:
        # require_filters_on: [order_date]

    # ----- customers: a dimension model -------------------------------------
    # No RLS here: tenant isolation rides in through the `orders` join, and a
    # second `tenant_id` predicate would currently render the column ambiguous
    # in cross-model SQL (an unqualified-predicate limitation of the compiler).
    - name: customers
      description: One row per customer.
      source: data.customers
      primary_key: [id]
      dimensions:
        - { name: region,      expr: region,     type: string }
        - { name: signup_date, expr: created_at, type: time, grains: [day, month] }
      measures:
        - { name: customer_count, agg: count_distinct, expr: id }
        # An additive count — eligible for rollup acceleration (unlike the
        # count_distinct above, which must read the base table).
        - { name: customer_total, agg: count, expr: id }

      # A pre-aggregation (S6) on a non-RLS model with an additive measure: a
      # query for `customer_total` by `region` reads the materialized rollup
      # `"semantic"."customers__by_region"` instead of re-scanning the base.
      pre_aggregations:
        - name: by_region
          dimensions: [region]
          measures:   [customer_total]

  # ----- metrics: composed business numbers over the measures above ---------
  # Queried by their dot-free name in the same position as a `model.measure`.
  # Every leaf inherits the model's RLS, so orders-based metrics still require
  # the tenant param.
  metrics:
    # revenue ÷ distinct orders
    - name: aov
      description: Average order value.
      kind: { ratio: { numerator: orders.revenue, denominator: orders.order_count } }
      format: "$#,##0.00"

    # cross-model — revenue (orders) ÷ customer count (customers)
    - name: arpu
      description: Average revenue per customer.
      kind: { ratio: { numerator: orders.revenue, denominator: customers.customer_count } }
      format: "$#,##0.00"

    # running total over a dense month axis (a month with no orders still counts)
    - name: revenue_running
      description: Cumulative revenue over time.
      kind: { cumulative: { measure: orders.revenue, window: running_total } }

    # month-over-month growth, aligned to the calendar
    - name: revenue_mom
      description: Month-over-month revenue growth.
      kind: { offset: { measure: orders.revenue, periods: 1, output: growth } }
      format: "0.0%"

    # each country's share of total revenue (over: [] = grand total)
    - name: country_share
      description: Share of revenue by shipping country.
      kind: { share: { measure: orders.revenue, over: [] } }
      format: "0.0%"
