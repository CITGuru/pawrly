# Multi-file workspace config.
# yaml-language-server: $schema=../../schemas/pawrly.schema.json
#
# Demonstrates both composition primitives:
#   - `include:` splices whole `sources:` lists from other files (globs ok).
#   - `from:`    loads one source's body from a partial-SourceDef file.

version: 1
name: multi-file

defaults:
  http:
    timeout: 30s

secrets:
  - kind: env
  - kind: keyring
    service: pawrly

include:
  - ./sources/http/*.yaml   # one source per file, glob-expanded + sorted
  - ./team-sources.yaml     # a multi-source fragment

sources:
  # Inline sources still work alongside include: / from:.
  - name: data
    kind: file
    config:
      path: ./data/*.parquet

  # `from:` keeps the inventory visible here while offloading the body.
  - name: warehouse
    kind: snowflake
    from: ./sources/warehouse.yaml
    config:
      schema: STAGING        # overrides the fragment's nested key
