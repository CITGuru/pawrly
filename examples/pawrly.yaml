# Pawrly workspace config.
# yaml-language-server: $schema=../schemas/pawrly.schema.json
#
# Kitchen-sink: one source of every kind. Two foundational backends — `file`
# and `http` — plus the first-class database / lakehouse builtins.

version: 1
name: kitchen-sink

defaults:
  cache:
    storage: ~/.pawrly/cache
    mode: { mode: none }
  http:
    timeout: 30s
    user_agent: pawrly/0.0.1
  safety:
    max_unfiltered_rows: 1000000
  engine:
    query_timeout: 5m
    max_concurrent_queries: 16
    duckdb_pool_size: 8

# `secrets:` is optional; if omitted, env + OS keyring are tried in that order.
secrets:
  - kind: env
  - kind: keyring
    service: pawrly

sources:
  # ----- Local files (parquet/csv/json) --------------------------------------
  - name: data
    kind: file
    # `examples:` are SQL probes run by `pawrly check`.
    examples:
      - SELECT COUNT(*) FROM data.orders
    config:
      path: ./data/*.parquet

  # ----- Object storage, under `file` via a `storage:` block -----------------
  #       `type: s3` also covers S3-compatible stores (set `endpoint`).
  - name: lake
    kind: file
    config:
      storage:
        type: s3                  # s3 | gcs | azure
        region: us-east-1
        auth:
          type: access_key        # access_key | credential_chain
          access_key_id: ${secret:AWS_KEY_ID}
          secret_access_key: ${secret:AWS_SECRET}
          # endpoint: ${env:AWS_ENDPOINT}   # S3-compatible stores
    tables:
      - name: events
        path: s3://example-bucket/events/*.parquet

  # ----- HTTP (define your own typed tables; raw escape hatch optional) ------
  - name: gh
    kind: http
    # `wiki:` is agent-facing usage notes surfaced by `describe_table`;
    # a table's own `wiki:` is appended after the source's.
    wiki: |
      Every endpoint needs `owner` and `repo` filters. Timestamps are ISO-8601 UTC.
    examples:
      - SELECT * FROM gh.pulls WHERE owner = 'pawrly' AND repo = 'pawrly' LIMIT 1
    config:
      base_url: https://api.github.com
      token: ${secret:GITHUB_TOKEN}
    raw_table: true
    tables:
      - name: pulls
        wiki: |
          `state` defaults to `open`; set `state = 'all'` to include closed/merged PRs.
        endpoint: /repos/{owner}/{repo}/pulls
        params:
          - { name: owner, required: true }
          - { name: repo, required: true }
          - { name: state, required: false, default: open }
        response:
          path: $
          schema:
            - { name: number, type: bigint }
            - { name: title, type: varchar }
            - { name: state, type: varchar }

  # ----- HTTP (another API) --------------------------------------------------
  - name: linear
    kind: http
    config:
      base_url: https://api.linear.app
      token: ${secret:LINEAR_API_KEY}
    raw_table: true

  # ----- Postgres (DuckDB ATTACH, read-only) ---------------------------------
  - name: oltp
    kind: postgres
    config:
      dsn: ${secret:PG_DSN}

  # ----- Local DuckDB database file ------------------------------------------
  - name: local_db
    kind: duckdb
    config:
      path: ./analytics.duckdb

  # ----- Snowflake (DuckDB ATTACH) -------------------------------------------
  - name: warehouse
    kind: snowflake
    config:
      account: acme.us-east-1
      user: ${secret:SNOWFLAKE_USER}
      password: ${secret:SNOWFLAKE_PASSWORD}
      database: ANALYTICS
      schema: PUBLIC
    cache:
      mode: refresh
      every: 1h

  # ----- Iceberg table format (DuckDB iceberg_scan) --------------------------
  - name: lakehouse
    kind: iceberg
    tables:
      - name: orders
        path: ./warehouse/orders

  # ----- DuckLake lakehouse catalog ------------------------------------------
  - name: dl
    kind: ducklake
    config:
      catalog: ./metadata.ducklake
      data_path: ./lake_data
