[graph]
all-features = false
no-default-features = false

[advisories]
yanked = "warn"
ignore = [
    # rustls-pemfile is unmaintained but only pulled in transitively via tonic
    # v0.12.3; there is no safe upgrade we control. Revisit when tonic migrates
    # to rustls-pki-types' PemObject API.
    "RUSTSEC-2025-0134",
    # paste is unmaintained but only pulled in transitively via arrow-flight and
    # datafusion; no safe replacement we control.
    "RUSTSEC-2024-0436",
]

[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "MPL-2.0",
    "CC0-1.0",
    "Zlib",
    "0BSD",
    # bzip2-1.0.6: BSD-style license of libbz2-rs-sys (transitive via bzip2/parquet)
    "bzip2-1.0.6",
    # CDLA-Permissive-2.0: permissive license of webpki-roots (transitive via reqwest)
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8
exceptions = []

[bans]
multiple-versions = "warn"
wildcards = "deny"
allow = []
deny = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
